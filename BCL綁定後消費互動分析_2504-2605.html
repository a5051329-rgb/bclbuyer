function hbars(id,rows,color='',clickable=false){let mx=Math.max(...rows.map(x=>x.value),1),el=document.getElementById(id);el.innerHTML=rows.length?rows.map(x=>`<div class="bar ${clickable?'clickable':''}" ${clickable?`data-label="${x.label}"`:''}><span>${x.label}</span><div class="track"><div class="fill ${color}" style="width:${Math.max(1,x.value/mx*100)}%"></div></div><span class="value">${x.display||(x.format==='pct'?fmtP(x.value):fmtN(x.value))}</span></div>`).join(''):'<div class="hint">此篩選條件沒有資料</div>';if(clickable)el.querySelectorAll('[data-label]').forEach(x=>x.onclick=()=>showAgeProducts(x.dataset.label))}

function productRows(age=null){let rows=D.products.filter(r=>r.期間===period.value&&match(r)&&(!age||r.月齡等級===age));return agg(rows,'商品名稱','金額',['購買人數','數量']).sort((a,b)=>b.value-a.value).slice(0,10)}function productTableHtml(pr){return'<thead><tr><th>排名</th><th>商品</th><th>金額</th><th>購買人數</th><th>數量</th></tr></thead><tbody>'+pr.map((r,i)=>`<tr><td>${i+1}</td><td>${r.label}</td><td>${fmtN(r.value)}</td><td>${fmtN(r.購買人數)}</td><td>${fmtN(r.數量)}</td></tr>`).join('')+'</tbody>'}function renderProducts(){let pr=productRows();hbars('products',pr);productTable.innerHTML=productTableHtml(pr)}function showAgeProducts(age){let pr=productRows(age);ageDialogTitle.textContent=`${age}｜消費商品 Top 10`;hbars('ageProducts',pr,'teal');ageProductTable.innerHTML=productTableHtml(pr);ageDialog.showModal()}
function render(){let s=currentSummary();summary.innerHTML=`<div><span>BCL 人數</span><b>${fmtN(s.BCL人數)}</b></div><div><span>兩月內購買人數</span><b>${fmtN(s.兩月內消費人數)}</b></div><div><span>兩月內購買率</span><b>${fmtP(s.兩月內消費人數/s.BCL人數)}</b></div><div><span>兩月內消費金額</span><b>${fmtN(s.兩月內消費金額)}</b></div><div><span>累計購買人數</span><b>${fmtN(s.已消費BCL人數)}</b></div><div><span>累計購買率</span><b>${fmtP(s.已消費BCL人數/s.BCL人數)}</b></div><div><span>累計購買金額</span><b>${fmtN(s.累計消費金額)}</b></div>`;let mx=Math.max(s.兩月內消費金額,s.累計消費金額,1);amount.innerHTML=[['兩月內',s.兩月內消費金額,'teal'],['累計',s.累計消費金額,'']].map(x=>`<div class="amount-row"><b>${x[0]}</b><div class="amount-track"><div class="amount-fill fill ${x[2]}" style="width:${Math.max(1,x[1]/mx*100)}%">${fmtN(x[1])}</div></div></div>`).join('');let ar=agg(D.profile.filter(r=>r.期間===period.value&&match(r)),'月齡等級','人數');hbars('age',ages.map(a=>({label:a,value:(ar.find(x=>x.label===a)||{}).value||0})).filter(x=>x.value),'teal',true);let sr=agg(D.speed.filter(match),'區間','人數');hbars('speed',speeds.map(a=>({label:a,value:(sr.find(x=>x.label===a)||{}).value||0})).filter(x=>x.value),'purple');let tr=D.timing.filter(match),tn=tr.reduce((a,r)=>a+r.已消費人數,0),med=tn?tr.reduce((a,r)=>a+r.首購中位天數*r.已消費人數,0)/tn:0;timing.textContent=tn?`已消費 ${fmtN(tn)} 人；加權首購中位天數 ${med.toFixed(1)} 天。31–60 天含第 60 天，61 天以上則超過兩個月觀察界線。`:'';let pa=agg(D.platform.filter(r=>r.期間===period.value&&match(r)),'購買平台','金額').sort((a,b)=>b.value-a.value);hbars('platform',pa,'teal');let ck=period.value==='兩月內'?'兩月內消費金額':'累計消費金額',pk=period.value==='兩月內'?'兩月內消費人數':'已消費BCL人數',ca=agg(D.mc.filter(match),'綁定管道',ck,[pk]).sort((a,b)=>b.value-a.value).slice(0,15).map(x=>({...x,display:`${fmtN(x.value)}／${fmtN(x[pk])}人`}));hbars('channels',ca);renderProducts();renderTable()}
const columns={mc:['綁定月','綁定管道','BCL人數','已消費BCL人數','已消費人數占比','兩月內消費人數','兩月內/總BCL','兩月內/已消費','兩月內消費金額','累計消費金額','每BCL累計金額'],channel:['綁定管道','BCL人數','已消費BCL人數','已消費人數占比','兩月內消費人數','兩月內/總BCL','兩月內/已消費','兩月內消費金額','累計消費金額','每BCL累計金額'],monthly:['綁定月','BCL人數','已消費BCL人數','已消費人數占比','兩月內消費人數','兩月內/總BCL','兩月內/已消費','兩月內消費金額','累計消費金額','每BCL累計金額'],timing:['綁定月','綁定管道','已消費人數','首購中位天數','首購平均天數','7天內','30天內','60天內']};function cell(k,v){return k.includes('占比')||k.includes('/')||k.endsWith('天內')?fmtP(v):typeof v==='number'?fmtN(v):v}function renderTable(){let mode=tableMode.value,rows=[...D[mode]].filter(r=>!search.value||JSON.stringify(r).includes(search.value)),cs=columns[mode];if(sort.key)rows.sort((a,b)=>{let x=a[sort.key],y=b[sort.key];return((Number.isFinite(Number(x))&&Number.isFinite(Number(y)))?Number(x)-Number(y):String(x||'').localeCompare(String(y||''),'zh-Hant'))*sort.dir});table.innerHTML='<thead><tr>'+cs.map(c=>`<th data-k="${c}">${c}${sort.key===c?(sort.dir>0?' ▲':' ▼'):''}</th>`).join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cs.map(c=>`<td>${cell(c,r[c])}</td>`).join('')+'</tr>').join('')+'</tbody>';table.querySelectorAll('th').forEach(th=>th.onclick=()=>{let k=th.dataset.k;sort={key:k,dir:sort.key===k?-sort.dir:-1};renderTable()})}
function buildChecks(id,values,label){let el=document.getElementById(id);el.innerHTML=`<label><input type="checkbox" data-all checked>整體／全部</label>`+values.map(v=>`<label><input type="checkbox" data-item value="${v}">${v}</label>`).join('');el.onchange=e=>{let all=el.querySelector('[data-all]'),items=[...el.querySelectorAll('[data-item]')];if(e.target===all&&all.checked)items.forEach(x=>x.checked=false);if(e.target!==all&&e.target.checked)all.checked=false;if(!items.some(x=>x.checked))all.checked=true;let chosen=items.filter(x=>x.checked).map(x=>x.value);document.getElementById(label).textContent=(id==='monthChecks'?'綁定月：':'綁定管道：')+(chosen.length?chosen.join('、'):'整體／全部');render()}}
buildChecks('monthChecks',uniq(D.monthly,'綁定月'),'monthSummary');buildChecks('channelChecks',uniq(D.channel,'綁定管道'),'channelSummary');period.onchange=render;closeDialog.onclick=()=>ageDialog.close();ageDialog.onclick=e=>{if(e.target===ageDialog)ageDialog.close()};tableMode.onchange=()=>{sort={key:null,dir:-1};renderTable()};search.oninput=renderTable;render();
</script></body></html>
